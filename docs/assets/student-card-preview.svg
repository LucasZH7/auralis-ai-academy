<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071325"/>
      <stop offset="55%" stop-color="#102749"/>
      <stop offset="100%" stop-color="#0a1931"/>
    </linearGradient>
    <radialGradient id="cardGlow" cx="15%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#23497f" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#071325" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
